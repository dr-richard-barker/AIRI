site_name: AIRI - Astrobotany International Research Initiative
site_url: https://dr-richard-barker.github.io/AIRI/
site_description: Astrobotany Educational Ethos, tools and techniques
site_author: Gilbert Cauthorn, Sophia Griffith, Rachel Wang, and Dr. Richard Barker

docs_dir: docs

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: green
      accent: light green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: green
      accent: light green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - literate-nav:
      nav_file: SUMMARY.md
  - section-index

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
